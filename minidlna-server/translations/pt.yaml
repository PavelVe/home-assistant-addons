configuration:
  media_dirs:
    name: Diretórios de mídia
    description: "Lista de diretórios de mídia com prefixo de tipo. Formato: [TIPO,]CAMINHO onde TIPO é A(udio), V(ídeo), P(ictures) ou combinações (AV, AVP, etc.)"
  friendly_name:
    name: Nome de exibição
    description: Nome do servidor visível para clientes DLNA na sua rede
  inotify:
    name: Ativar inotify
    description: Detectar automaticamente arquivos novos/modificados/removidos através de notificações do sistema de arquivos
  notify_interval:
    name: Intervalo de notificação
    description: Intervalo de notificação SSDP em segundos (frequência com que o servidor se anuncia na rede)
  strict_dlna:
    name: DLNA rigoroso
    description: Aderir rigorosamente aos padrões DLNA (pode reduzir a compatibilidade com alguns clientes)
  enable_subtitles:
    name: Ativar legendas
    description: Ativar suporte a legendas para arquivos de vídeo
  log_level:
    name: Nível de log
    description: "Nível de detalhe dos logs MiniDLNA: off, fatal, error, warn, info, debug"
  wide_links:
    name: Links amplos
    description: Permitir links simbólicos que apontem para fora dos diretórios de mídia definidos
  root_container:
    name: Contêiner raiz
    description: "Contêiner raiz ao navegar: . (padrão), B (explorar pastas), M (música), V (vídeo), P (imagens)"
  force_rescan:
    name: Forçar re-varredura
    description: Excluir o banco de dados de mídia e realizar uma varredura completa na próxima inicialização
