configuration:
  device_path:
    name: Путь к устройству
    description: Путь к устройству GSM-модема (например, /dev/ttyUSB0)
  modem_baud_rate:
    name: Скорость передачи модема
    description: 'Скорость последовательного порта GSM-модема. Число, например 115200, фиксирует скорость (рекомендуется, устраняет зависание SIM800/SIM800C); "auto" позволяет gammu определить её автоматически (прежнее поведение). Если модем не запускается после обновления, попробуйте "auto".'
  urc_filter_enabled:
    name: Фильтр URC (предупреждения модема)
    description: Отфильтровывает паразитные статусные сообщения модема, такие как "OVER-VOLTAGE WARNNING" (характерно для SIM800), которые могут заблокировать связь с gammu. Рекомендуется оставить включённым.
  pin:
    name: PIN-код SIM
    description: PIN-код SIM-карты (оставьте пустым, если PIN не требуется)
  ssl:
    name: Включить SSL
    description: Включить HTTPS для защищённых соединений (требуются SSL-сертификаты)
  username:
    name: Имя пользователя
    description: Имя пользователя для аутентификации через API
  password:
    name: Пароль
    description: Пароль для аутентификации через API
  mqtt_enabled:
    name: Включить MQTT
    description: Публиковать SMS и статус устройства в MQTT-брокер
  mqtt_host:
    name: Хост MQTT
    description: Имя хоста MQTT-брокера (используйте 'core-mosquitto' для встроенного брокера HA)
  mqtt_port:
    name: Порт MQTT
    description: Порт MQTT-брокера (обычно 1883)
  mqtt_username:
    name: Имя пользователя MQTT
    description: Имя пользователя для аутентификации в MQTT (оставьте пустым, если не требуется)
  mqtt_password:
    name: Пароль MQTT
    description: Пароль для аутентификации в MQTT (оставьте пустым, если не требуется)
  mqtt_topic_prefix:
    name: Префикс топика MQTT
    description: Префикс топика MQTT для публикуемых сообщений
  mqtt_device_id:
    name: Идентификатор устройства MQTT
    description: Уникальный идентификатор устройства для автообнаружения в Home Assistant. Меняйте только при запуске нескольких экземпляров на одном MQTT-брокере. Значение по умолчанию сохраняет текущее поведение.
  sms_monitoring_enabled:
    name: Включить мониторинг SMS
    description: Автоматически определять и публиковать входящие SMS в MQTT (управляет как обратным вызовом, так и опросом)
  sms_check_interval:
    name: Интервал проверки SMS
    description: Резервный интервал опроса SMS (в секундах, 30–300). Аддон предпочитает обратный вызов в реальном времени; опрос используется как резерв при сбое или отсутствии поддержки обратного вызова.
  sms_cost_per_message:
    name: Стоимость одного SMS
    description: Стоимость одного отправленного SMS. Установите 0, чтобы отключить учёт стоимости.
  sms_cost_currency:
    name: Валюта
    description: Валюта для отображения стоимости SMS (например, RUB, EUR, USD)
  auto_delete_read_sms:
    name: Автоудаление прочитанных SMS
    description: Автоматически удалять SMS-сообщения с SIM-карты после прочтения (освобождает место на SIM-карте)
  sms_delete_delay_seconds:
    name: Задержка перед удалением SMS
    description: Количество секунд ожидания перед автоматическим удалением прочитанного SMS (0 = удалить сразу). Защитная задержка, чтобы автоматизации успели обработать сообщение, а медленно приходящие многочастные SMS успели полностью собраться.
  missed_calls_monitoring_enabled:
    name: Включить мониторинг звонков
    description: Определение звонков в реальном времени через обратные вызовы Gammu — фиксирует входящие и пропущенные звонки (работает на SIM800L и большинстве модемов)
  incoming_call_auto_reset_seconds:
    name: Таймаут автосброса входящего звонка
    description: Автоматически сбрасывать состояние входящего звонка по истечении указанного количества секунд (резерв для модемов, не отправляющих событие завершения звонка). Таймер перезапускается при каждом событии RING. Задайте значение от 10 до 300 секунд.
  voice_call_enabled:
    name: Голосовые звонки (экспериментально)
    description: "Экспериментально: набор номеров через REST API или кнопку MQTT. Звонок длится ~35 с, затем завершается по таймауту сети. Модем недоступен ~2 мин после каждого звонка (автоматическое восстановление). Завершение звонка вручную не поддерживается. Рекомендуется только для оповещений и сигнализации."
